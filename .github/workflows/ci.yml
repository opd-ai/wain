name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (fully static via musl)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Install musl-tools before the Rust toolchain so the linker is present
      # when Cargo's build.rs scripts run.  This step is required; the build
      # will fail if musl-gcc is not available.
      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
          musl-gcc --version

      - name: Set up Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: render-sys/target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('render-sys/Cargo.toml', 'render-sys/src/**') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Run Rust tests
        run: |
          cargo test --manifest-path render-sys/Cargo.toml \
            --target x86_64-unknown-linux-musl

      - name: Build Rust static library (musl)
        run: |
          cargo build --release \
            --manifest-path render-sys/Cargo.toml \
            --target x86_64-unknown-linux-musl

      - name: Build fully static Go binary
        env:
          CC: musl-gcc
          CGO_ENABLED: "1"
          CGO_LDFLAGS_ALLOW: ".*"
        run: |
          CGO_LDFLAGS="${PWD}/render-sys/target/x86_64-unknown-linux-musl/release/librender_sys.a -ldl -lm -lpthread" \
            go build \
              -ldflags "-extldflags '-static'" \
              -o bin/wain \
              ./cmd/wain

      - name: Run Go tests
        env:
          CC: musl-gcc
          CGO_ENABLED: "1"
          CGO_LDFLAGS_ALLOW: ".*"
        run: |
          CGO_LDFLAGS="${PWD}/render-sys/target/x86_64-unknown-linux-musl/release/librender_sys.a -ldl -lm -lpthread" \
            go test ./...

      - name: Run integration tests
        env:
          CC: musl-gcc
          CGO_ENABLED: "1"
          CGO_LDFLAGS_ALLOW: ".*"
        run: |
          CGO_LDFLAGS="${PWD}/render-sys/target/x86_64-unknown-linux-musl/release/librender_sys.a -ldl -lm -lpthread" \
            go test -v -run TestPublicAPI ./...
          CGO_LDFLAGS="${PWD}/render-sys/target/x86_64-unknown-linux-musl/release/librender_sys.a -ldl -lm -lpthread" \
            go test -v -run TestAccessibility ./...
          CGO_LDFLAGS="${PWD}/render-sys/target/x86_64-unknown-linux-musl/release/librender_sys.a -ldl -lm -lpthread" \
            go test -v -run TestExampleApp ./internal/integration

      - name: Run build verification
        run: |
          bash scripts/verify-build.sh

      - name: Build example app
        env:
          CC: musl-gcc
          CGO_ENABLED: "1"
          CGO_LDFLAGS_ALLOW: ".*"
        run: |
          CGO_LDFLAGS="${PWD}/render-sys/target/x86_64-unknown-linux-musl/release/librender_sys.a -ldl -lm -lpthread" \
            go build \
              -ldflags "-extldflags '-static'" \
              -o bin/example-app \
              ./cmd/example-app

      - name: Smoke-test binaries
        run: |
          ./bin/wain || true
          ./bin/example-app || true

      - name: Assert fully static binaries
        run: |
          echo "=== Checking wain binary ==="
          ldd bin/wain 2>&1 || true
          if ldd bin/wain 2>&1 | grep -q "not a dynamic executable"; then
            echo "✓ wain binary is fully statically linked."
          else
            echo "ERROR: wain binary is dynamically linked — musl build must produce a static binary."
            exit 1
          fi
          echo ""
          echo "=== Checking example-app binary ==="
          ldd bin/example-app 2>&1 || true
          if ldd bin/example-app 2>&1 | grep -q "not a dynamic executable"; then
            echo "✓ example-app binary is fully statically linked."
          else
            echo "ERROR: example-app binary is dynamically linked — musl build must produce a static binary."
            exit 1
          fi

  gpu-integration-tests:
    name: GPU Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
          musl-gcc --version

      - name: Set up Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: render-sys/target
          key: ${{ runner.os }}-cargo-musl-${{ hashFiles('render-sys/Cargo.toml', 'render-sys/src/**') }}
          restore-keys: ${{ runner.os }}-cargo-musl-

      - name: Build Rust static library (musl)
        run: |
          cargo build --release \
            --manifest-path render-sys/Cargo.toml \
            --target x86_64-unknown-linux-musl

      - name: Check for GPU hardware
        id: gpu-check
        run: |
          if [ -e /dev/dri/renderD128 ]; then
            echo "gpu_available=true" >> $GITHUB_OUTPUT
            echo "✓ GPU render node detected: /dev/dri/renderD128"
          else
            echo "gpu_available=false" >> $GITHUB_OUTPUT
            echo "⚠ No GPU render node detected — integration tests will be skipped"
          fi

      - name: Run GPU integration tests
        if: steps.gpu-check.outputs.gpu_available == 'true'
        env:
          CC: musl-gcc
          CGO_ENABLED: "1"
          CGO_LDFLAGS_ALLOW: ".*"
        run: |
          CGO_LDFLAGS="${PWD}/render-sys/target/x86_64-unknown-linux-musl/release/librender_sys.a -ldl -lm -lpthread" \
            go test -tags=integration -v ./internal/integration -run TestGPURenderingTriangle

      - name: Skip GPU tests (no hardware)
        if: steps.gpu-check.outputs.gpu_available != 'true'
        run: |
          echo "Skipping GPU integration tests: no GPU hardware detected"
          echo "Tests will run successfully when GPU hardware is available"

